name: Build Sworcery Patcher

on:
  push:
    branches: [ master ]
  workflow_dispatch:

jobs:
  build_patchers:
    name: Build ${{ matrix.locale }} for ${{ matrix.os }}
    runs-on: ${{ matrix.os }}
    strategy:
      matrix:
        locale: [es, pt]
        os: [windows-latest, macos-latest, ubuntu-latest]
    
    steps:
      - uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.9'

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          python -m pip install Pillow pyinstaller

      - name: Install 7za (Binary Setup)
        shell: bash
        run: |
          mkdir -p bin
          if [ "${{ matrix.os }}" = "windows-latest" ]; then
            # Windows runners already have 7z.exe in the PATH
            7z --help > /dev/null
          elif [ "${{ matrix.os }}" = "macos-latest" ]; then
            brew install p7zip || true
          else
            sudo apt-get update && sudo apt-get install -y p7zip-full
          fi

      - name: Download Base sworcery.dat
        id: download_base
        shell: bash
        env:
          DOWNLOAD_URL: ${{ secrets.SWORCERY_DAT_URL }}
        run: |
          if [ ! -f "sworcery.dat" ]; then
            if [ -n "$DOWNLOAD_URL" ]; then
              echo "Downloading sworcery.dat from remote URL..."
              curl -L "$DOWNLOAD_URL" -o sworcery.dat
            else
              echo "::error::sworcery.dat not found and SWORCERY_DAT_URL secret is not set!"
              exit 1
            fi
          fi
          
          if [ ! -f "sworcery.dat" ]; then
            echo "::error::Failed to obtain sworcery.dat."
            exit 1
          fi

      - name: Build Patched Data
        shell: bash
        env:
          SWORCERY_PASSWORD: ${{ secrets.SWORCERY_PASSWORD }}
        run: |
          chmod +x tools/steam/*.sh tools/common/*.sh
          ./tools/steam/build.sh sworcery.dat ${{ matrix.locale }}

      - name: Build and Bundle Installer
        shell: bash
        env:
          APP_LOCALE: ${{ matrix.locale }}
        run: |
          mkdir -p build/installer
          python tools/bundle_patcher.py ${{ matrix.locale }}

      - name: Debug Output Directory
        shell: bash
        run: |
          echo "Current directory: $(pwd)"
          echo "Listing build/installer recursively:"
          ls -R build/installer || echo "Directory build/installer not found"
          echo "Full tree:"
          find build -maxdepth 4 || true

      - name: Upload Artifact
        uses: actions/upload-artifact@v4
        with:
          name: Patcher_${{ matrix.locale }}_${{ runner.os }}
          path: build/installer/
          if-no-files-found: error
